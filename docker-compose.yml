# Dev-only stack. Production deployment is out of scope for Sprint 1.
services:
  backend:
    build:
      context: ./backend
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
    ports:
      - "8088:8000"
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build:
      context: ./frontend
    command: npm run dev -- --host 0.0.0.0 --port 5180
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5180:5180"
    environment:
      - VITE_BACKEND_URL=http://192.168.1.146:8088

    depends_on:
      - backend
